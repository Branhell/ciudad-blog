<div class="login-container">

  <!-- Tarjeta login -->
  <div class="login-card">

    <!-- Logo -->
    <img src="assets/EcoBits_Logo.png" class="login-logo">

    <!-- Volver -->
    <p routerLink="/" class="back-home">← Volver al inicio</p>

    <h2>Iniciar sesión</h2>

    <!-- Botones sociales (visual por ahora) -->
    <div class="social-login">
      <button class="social-btn google">Google</button>
      <button class="social-btn github">GitHub</button>
      <button class="social-btn linkedin">LinkedIn</button>
    </div>

    <div class="divider">o</div>

    <!-- Formulario -->
    <form (ngSubmit)="onLogin()" class="form-login">

      <input type="email" [(ngModel)]="username" name="username" placeholder="Correo electrónico" required>

      <input type="password" [(ngModel)]="password" name="password" placeholder="Contraseña" required>

      <p class="forgot">¿Olvidaste tu contraseña?</p>

      <button type="submit" class="btn-login">Ingresar</button>
    </form>

    <!-- Mensaje backend -->
    <div *ngIf="mensaje" class="mensaje">
      {{ mensaje }}
    </div>

    <!-- Registro -->
    <p class="register">
      ¿No tienes cuenta?
      <a routerLink="/registro">Regístrate</a>
    </p>

  </div>
</div>
