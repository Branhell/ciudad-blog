<div class="faq-container">
  <!-- Hero -->
  <div class="hero-faq">
    <div class="hero-icon">❓✨</div>
    <h1>Preguntas <span class="gradient">Frecuentes</span></h1>
    <p>Respuestas a las dudas más comunes sobre OpenPsy</p>
  </div>

  <!-- Grid de preguntas -->
  <div class="faq-grid">
    <div class="faq-card" *ngFor="let p of preguntas" [class.open]="p.abierta">
      <div class="faq-question" (click)="togglePregunta(p.id)">
        <div class="question-icon">{{ p.abierta ? '🔓' : '🔒' }}</div>
        <h3>{{ p.pregunta }}</h3>
        <div class="question-arrow">{{ p.abierta ? '▲' : '▼' }}</div>
      </div>
      <div class="faq-answer" *ngIf="p.abierta">
        <div class="answer-content">
          <div class="answer-icon">✨</div>
          <p>{{ p.respuesta }}</p>
        </div>
      </div>
    </div>
  </div>

  <!-- CTA final -->
  <div class="cta-faq">
    <h2>¿No encuentras lo que buscas?</h2>
    <p>Estamos aquí para ayudarte</p>
    <a routerLink="/contacto" class="btn-faq">Contactar soporte →</a>
  </div>
</div>
