<div class="terminos-container">
  <!-- Hero -->
  <div class="hero-terminos">
    <div class="hero-badge">
      <i class="fas fa-gavel"></i> Open Psychology
    </div>
    <h1>Términos y <span class="gradient">Condiciones</span></h1>
    <p>Lee con atención nuestro pacto digital. Transparencia y confianza para ti.</p>
    <div class="trust-badges">
      <span><i class="fas fa-handshake"></i> Confianza mutua</span>
      <span><i class="fas fa-balance-scale"></i> Justicia digital</span>
      <span><i class="fas fa-eye"></i> Transparencia</span>
    </div>
  </div>

  <!-- Acordeón de términos -->
  <div class="acordeon-terminos">
    <div class="termino-card" *ngFor="let t of terminos" [class.open]="t.abierto">
      <div class="termino-header" (click)="toggleTermino(t.id)">
        <div class="termino-icon">
          <i class="fas" [class.fa-chevron-circle-right]="!t.abierto" [class.fa-chevron-circle-down]="t.abierto"></i>
        </div>
        <h3>{{ t.titulo }}</h3>
        <div class="termino-arrow">
          <i class="fas" [class.fa-chevron-down]="!t.abierto" [class.fa-chevron-up]="t.abierto"></i>
        </div>
      </div>
      <div class="termino-body" *ngIf="t.abierto">
        <div class="termino-texto">
          <div class="quote-icon">
            <i class="fas fa-quote-left"></i>
          </div>
          <p>{{ t.texto }}</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="terminos-footer">
    <div class="footer-content">
      <div class="footer-icon">
        <i class="fas fa-envelope"></i>
      </div>
      <p>¿Dudas sobre estos términos? Escríbenos a <strong>legal@openpsy.com</strong></p>
      <p class="fecha-actualizacion">
        <i class="fas fa-calendar-alt"></i> Última actualización: 25 de abril de 2026
      </p>
      <button class="btn-home" (click)="irAlInicio()">
        <i class="fas fa-home"></i> Volver al inicio →
      </button>
    </div>
  </div>
</div>
