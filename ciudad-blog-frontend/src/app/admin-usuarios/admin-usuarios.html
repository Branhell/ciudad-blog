<div class="admin-usuarios-container">
  <div class="admin-header">
    <h1><i class="fas fa-users"></i> Gestión de Usuarios</h1>
    <p>Administra todos los usuarios de la plataforma EcoBits</p>
  </div>

  <div class="usuarios-table-wrapper">
    <table class="usuarios-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Email</th>
          <th>Rol</th>
          <th>Fecha registro</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let usuario of usuarios">
          <td>{{ usuario.id }}</td>
          <td><strong>{{ usuario.nombre }}</strong></td>
          <td>{{ usuario.email }}</td>
          <td>
            <span class="rol-badge" [ngClass]="{
              'rol-paciente': usuario.rol === 'PACIENTE',
              'rol-profesional': usuario.rol === 'PROFESIONAL',
              'rol-admin': usuario.rol === 'ADMIN'
            }">{{ usuario.rol }}</span>
          </td>
          <td>{{ usuario.fechaRegistro }}</td>
          <td class="acciones">
            <button class="btn-editar"><i class="fas fa-edit"></i></button>
            <button class="btn-eliminar"><i class="fas fa-trash"></i></button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="admin-back">
    <a routerLink="/dashboard" class="btn-volver">
      <i class="fas fa-arrow-left"></i> Volver al Dashboard
    </a>
  </div>
</div>
