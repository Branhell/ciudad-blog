<div class="faqs-cosmic">
  <!-- Fondo estelar animado -->
  <div class="stars"></div>
  <div class="twinkling"></div>

  <!-- Hero -->
  <div class="hero-cosmic">
    <div class="cosmic-glow"></div>
    <div class="hero-icon">🌌✨</div>
    <h1>FAQ COSMIC</h1>
    <p>Respuestas del universo digital</p>
    <div class="search-hint">
      <span>🔍 Explora las cápsulas de sabiduría</span>
    </div>
  </div>

  <!-- Grid de cápsulas flotantes -->
  <div class="capsules-grid">
    <div class="capsule" *ngFor="let p of preguntas" [class.expanded]="p.abierta">
      <div class="capsule-question" (click)="togglePregunta(p.id)">
        <div class="capsule-icon">{{ p.abierta ? '🔮' : '📦' }}</div>
        <h3>{{ p.pregunta }}</h3>
        <div class="capsule-trigger">{{ p.abierta ? '▲' : '▼' }}</div>
      </div>
      <div class="capsule-answer" *ngIf="p.abierta">
        <div class="answer-wave">~~~</div>
        <p>{{ p.respuesta }}</p>
        <div class="answer-wave">~~~</div>
      </div>
    </div>
  </div>

  <!-- CTA final -->
  <div class="cosmic-footer">
    <div class="footer-card">
      <span class="footer-icon">💬</span>
      <p>¿No encuentras lo que buscas?</p>
      <a routerLink="/contacto" class="btn-cosmic">Habla con el oráculo →</a>
    </div>
  </div>
</div>
