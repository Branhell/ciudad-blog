<div class="privacidad-container">
  <!-- Hero -->
  <div class="hero-privacidad">
    <div class="hero-badge">
      <i class="fas fa-shield-alt"></i> Open Psychology
    </div>
    <h1>Política de <span class="gradient">Privacidad</span></h1>
    <p>Tu confianza es nuestra prioridad. Conoce cómo protegemos tus datos.</p>
    <div class="trust-badges">
      <span><i class="fas fa-lock"></i> Cifrado SSL</span>
      <span><i class="fas fa-key"></i> JWT + HTTPS</span>
      <span><i class="fas fa-globe"></i> Cumplimiento global</span>
    </div>
  </div>

  <!-- Grid de secciones -->
  <div class="privacidad-grid">
    <div class="privacidad-card" *ngFor="let sec of secciones; let i = index">
      <div class="card-icon">
        <i [class]="getIcono(i)"></i>
      </div>
      <h2>{{ sec.titulo }}</h2>
      <p>{{ sec.texto }}</p>
    </div>
  </div>

  <!-- Fecha y contacto -->
  <div class="privacidad-footer">
    <div class="footer-content">
      <div class="footer-icon">
        <i class="fas fa-envelope"></i>
      </div>
      <p>¿Dudas sobre tu privacidad? Escríbenos a <strong>privacidad@openpsy.com</strong></p>
      <p class="fecha-actualizacion">
        <i class="fas fa-calendar-alt"></i> Última actualización: 25 de abril de 2026
      </p>
      <button class="btn-home" (click)="irAlInicio()">
        <i class="fas fa-home"></i> Volver al inicio →
      </button>
    </div>
  </div>
</div>
